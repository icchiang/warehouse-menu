<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍹 雲端倉庫飲品選擇 (智能圖表實時版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
        }
        body {
            background: #f8f9fa;
            max-width: 900px;
            margin: 20px auto;
            padding: 15px;
        }
        .title {
            text-align: center;
            color: #d9534f;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h3 {
            color: #333;
            margin-bottom: 15px;
            border-left: 4px solid #5bc0de;
            padding-left: 10px;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 16px;
            background-color: #fff;
        }
        select:focus, input:focus {
            border-color: #5bc0de;
            outline: none;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled {
            background: #ccc !important;
            color: #666 !important;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .btn-blue { background: #5bc0de; color: #fff; }
        .btn-red { background: #d9534f; color: #fff; }
        .btn-green { background: #5cb85c; color: #fff; }
        .btn-gray { background: #777; color: #fff; }

        .drink-item, .name-item {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
            gap: 10px;
        }
        .drink-item:last-child, .name-item:last-child { border-bottom: none; }

        .num-tag {
            font-size: 14px;
            padding: 3px 8px;
            border-radius: 8px;
            margin: 0 4px;
            display: inline-block;
            font-weight: bold;
        }
        .cold { background: #e1f5fe; color: #0288d1; }
        .warm { background: #e8f5e9; color: #388e3c; }
        .stock-tag { background: #e2e3e5; color: #383d41; }
        .stock-warn { background: #f8d7da; color: #721c24; }

        .record-item {
            padding: 8px;
            border-bottom: 1px solid #f1f1f1;
            font-size: 15px;
        }
        .admin { display: none; margin-top: 15px; }
        .total-user {
            text-align: center;
            font-size: 18px;
            color: #d9534f;
            font-weight: bold;
            margin: 10px 0;
        }
        
        /* 圖表專用排版容器 */
        .chart-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 15px;
        }
        .chart-box {
            flex: 1;
            min-width: 280px;
            max-width: 100%;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eaeaea;
        }
        .chart-box h4 {
            text-align: center;
            margin-bottom: 10px;
            color: #555;
            font-size: 14px;
        }
        canvas {
            max-height: 260px;
        }

        .admin-sub-title {
            margin: 15px 0 10px 0;
            color: #666;
            border-left: 3px solid #777;
            padding-left: 8px;
        }
    </style>
</head>
<body>
    <h1 class="title">🍹 雲端倉庫飲品實時報名</h1>

    <div class="card">
        <h3>1. 選擇你的姓名</h3>
        <select id="userSelect">
            <option value="">-- 請選擇你的名字 --</option>
        </select>
    </div>

    <div class="card">
        <h3>2. 選擇飲品（自動扣減庫存）</h3>
        <div id="selectDrinkList" class="loading-text">連線雲端中，請稍候...</div>
    </div>

    <div class="card">
        <h3>3. 快捷選擇</h3>
        <div class="btn-group">
            <button class="btn-red" id="btnSpecialNone">🙏 唔食</button>
            <button class="btn-gray" id="btnSpecialFoodOnly">🙏 淨食餐</button>
        </div>
    </div>

    <div class="card">
        <h3>📊 今日數據圖表統計</h3>
        <div id="noDataText" style="text-align: center; color: #999; padding: 20px 0;">今日暫時未有任何點餐記錄，無法產生圖表。</div>
        <div class="chart-container" id="chartsWrapper" style="display: none;">
            <div class="chart-box">
                <h4>🥤 各項飲品比例 (圓餅圖)</h4>
                <canvas id="pieChart"></canvas>
            </div>
            <div class="chart-box">
                <h4>📈 熱門排行對比 (條形圖)</h4>
                <canvas id="barChart"></canvas>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>📋 今日選擇記錄細節</h3>
        <div class="total-user" id="userCount">今日總人數：0</div>
        <div id="recordList"></div>
    </div>

    <div class="card">
        <button class="btn-blue" id="btnToggleAdmin" style="width: 100%;">🔧 後台管理員面板 (名單/庫存修改)</button>
        <div class="admin" id="adminPanel">
            
            <h4 class="admin-sub-title">👥 人員名單管理</h4>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="newMemberName" placeholder="輸入新同事姓名" style="margin-bottom:0; flex: 3;">
                <button class="btn-green" id="btnCloudAddMember" style="white-space: nowrap; flex: 1;">➕ 新增姓名</button>
            </div>
            <div id="manageNameList" style="max-height: 180px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 20px;"></div>

            <h4 class="admin-sub-title">📦 倉庫飲品與初始庫存</h4>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="newDrinkName" placeholder="輸入新飲品名稱" style="margin-bottom:0; flex: 2;">
                <input type="number" id="newDrinkStock" placeholder="初始庫存" style="margin-bottom:0; flex: 1;" min="0" value="10">
                <button class="btn-green" id="btnCloudAddDrink" style="white-space: nowrap; flex: 1;">➕ 新增</button>
            </div>
            <div id="manageDrinkList"></div>
        </div>
    </div>

    <div class="card" style="background: transparent; box-shadow: none; padding: 0;">
        <button class="btn-red" id="btnClearAll" style="width: 100%;">🗑️ 手動清空今日記錄（庫存自動回補）</button>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// 帶入你原本的金鑰資訊
const firebaseConfig = {
    apiKey: "AIzaSyCFbSd7K3NmoR_crJeyRHLkfiWrA4prHpE",
    authDomain: "warehouse-drinks.firebaseapp.com",
    databaseURL: "https://warehouse-drinks-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "warehouse-drinks",
    storageBucket: "warehouse-drinks.firebasestorage.app",
    messagingSenderId: "53252871821",
    appId: "1:53252871821:web:47d8aa223a7dba31f874c4"
};

// 初始化 Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const DATA_PATH = 'drinksSystemV2';

// 全域變數
let drinkList = [];
let todayRecord = [];
let userList = [];
let lastClearDate = "";
let lastUserListString = ""; 

// 圖表實例變數 (用來重新渲染更新)
let myPieChart = null;
let myBarChart = null;

function getTodayDateString() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

const defaultDrinks = [
    { name: '可樂', stock: 10 }, { name: '雪碧', stock: 10 },
    { name: '檸檬茶', stock: 10 }, { name: '奶茶', stock: 10 },
    { name: '咖啡', stock: 10 }, { name: '菊花茶', stock: 10 }
];
const defaultUsers = ['藍', 'Arthur', 'Andy', '筆筆', 'Mavis', 'Estella', 'Kevin', '文傑', 'Yan', 'Alice', 'Rain', 'Michelle'];

// 監聽雲端資料
onValue(ref(db, DATA_PATH), (snapshot) => {
    const data = snapshot.val();
    const nowDate = getTodayDateString(); 

    if (data) {
        drinkList = data.drinkList || defaultDrinks;
        todayRecord = data.todayRecord ? Object.values(data.todayRecord) : [];
        userList = data.userList || defaultUsers;
        lastClearDate = data.lastClearDate || "";

        if (lastClearDate !== nowDate) {
            todayRecord.forEach(record => {
                const match = drinkList.find(d => d.name === record.drink);
                if (match) match.stock += 1;
            });
            todayRecord = [];
            lastClearDate = nowDate;
            saveToCloud();
            return;
        }
    } else {
        drinkList = defaultDrinks;
        todayRecord = [];
        userList = defaultUsers;
        lastClearDate = nowDate;
        saveToCloud();
        return;
    }
    
    refreshUI();
    updateCharts(); // 每次資料更新時，重整圖表
});

function saveToCloud() {
    set(ref(db, DATA_PATH), {
        drinkList: drinkList,
        todayRecord: todayRecord,
        userList: userList,
        lastClearDate: lastClearDate
    });
}

function getDrinkStat(drinkName) {
    let coldNum = 0; let warmNum = 0;
    todayRecord.forEach(item => {
        if (item.drink === drinkName) {
            if (item.temp === '凍') coldNum++;
            if (item.temp === '唔凍') warmNum++;
        }
    });
    return { cold: coldNum, warm: warmNum, total: coldNum + warmNum };
}

// 實時網頁渲染
function refreshUI() {
    const currentUserListString = JSON.stringify(userList);
    if (lastUserListString !== currentUserListString) {
        const selectEl = document.getElementById('userSelect');
        const currentSelected = selectEl.value; 
        
        let selectHtml = '<option value="">-- 請選擇你的名字 --</option>';
        userList.forEach(user => {
            selectHtml += `<option value="${user}">${user}</option>`;
        });
        selectEl.innerHTML = selectHtml;
        
        if (userList.includes(currentSelected)) {
            selectEl.value = currentSelected;
        }
        lastUserListString = currentUserListString; 
    }

    const selectWrap = document.getElementById('selectDrinkList');
    let drinkHtml = '';
    drinkList.forEach((drinkItem, idx) => {
        const stat = getDrinkStat(drinkItem.name);
        const isOutOfStock = drinkItem.stock <= 0;
        const stockClass = drinkItem.stock <= 3 ? 'stock-warn' : 'stock-tag';
        
        drinkHtml += `
            <div class="drink-item">
                <div>
                    <strong style="font-size: 17px; color: ${isOutOfStock ? '#ccc' : '#333'}; text-decoration: ${isOutOfStock ? 'line-through' : 'none'};">${drinkItem.name}</strong>
                    <span class="num-tag ${stockClass}">倉儲剩餘：${drinkItem.stock} 支</span>
                    <div style="margin-top: 5px;">
                        <span class="num-tag cold">今日已點凍：${stat.cold}人</span>
                        <span class="num-tag warm">唔凍：${stat.warm}人</span>
                    </div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-blue btn-select" data-idx="${idx}" data-temp="凍" ${isOutOfStock ? 'disabled' : ''}>${isOutOfStock ? '賣晒' : '凍'}</button>
                    <button class="btn-green btn-select" data-idx="${idx}" data-temp="唔凍" ${isOutOfStock ? 'disabled' : ''}>${isOutOfStock ? '賣晒' : '唔凍'}</button>
                </div>
            </div>
        `;
    });
    selectWrap.innerHTML = drinkHtml || '<p style="text-align:center;color:#999;">暫無飲品</p>';

    const manageNameWrap = document.getElementById('manageNameList');
    let manageNameHtml = '';
    userList.forEach((user, idx) => {
        manageNameHtml += `
            <div class="name-item" style="padding: 6px 0;">
                <span>👤 ${user}</span>
                <button class="btn-red btn-delete-name" data-idx="${idx}" style="padding: 4px 10px; font-size:12px;">刪除</button>
            </div>
        `;
    });
    manageNameWrap.innerHTML = manageNameHtml || '<p style="color:#999; font-size:14px;">目前名單內無任何同事</p>';

    const manageWrap = document.getElementById('manageDrinkList');
    let manageHtml = '';
    drinkList.forEach((drinkItem, idx) => {
        manageHtml += `
            <div class="drink-item" style="align-items: center;">
                <div style="flex: 2;">
                    <span style="font-weight:bold;">品名：</span>
                    <input value="${drinkItem.name}" id="editDrinkName${idx}" style="width:70%; padding: 6px; margin-bottom: 0; display:inline-block;">
                </div>
                <div style="flex: 1.5; display:flex; align-items:center; gap:5px;">
                    <span style="font-weight:bold; white-space:nowrap;">庫存：</span>
                    <input type="number" value="${drinkItem.stock}" id="editDrinkStock${idx}" style="width:100%; padding: 6px; margin-bottom: 0;" min="0">
                </div>
                <div style="margin-left:8px; display: flex; gap: 5px;">
                    <button class="btn-green btn-update-drink" data-idx="${idx}" style="padding: 6px 12px; font-size: 14px;">更新</button>
                    <button class="btn-red btn-delete-drink" data-idx="${idx}" style="padding: 6px 12px; font-size: 14px;">移除</button>
                </div>
            </div>
        `;
    });
    manageWrap.innerHTML = manageHtml;

    const recordWrap = document.getElementById('recordList');
    document.getElementById('userCount').innerText = `今日總人數：${todayRecord.length}`;
    if (todayRecord.length === 0) {
        recordWrap.innerHTML = '<p style="text-align:center;color:#999;padding: 10px 0;">暫無選擇記錄</p>';
    } else {
        let recHtml = '';
        todayRecord.forEach(item => {
            recHtml += `<div class="record-item">⏱️ ${item.time} ｜ 👤 <strong>${item.name}</strong> ｜ 🥤 ${item.drink} ｜ 🌡️ ${item.temp}</div>`;
        });
        recordWrap.innerHTML = recHtml;
    }
}

// 核心功能：動態統計數據並刷新 Chart.js 圖表
function updateCharts() {
    if (todayRecord.length === 0) {
        document.getElementById('noDataText').style.display = 'block';
        document.getElementById('chartsWrapper').style.display = 'none';
        return;
    }

    document.getElementById('noDataText').style.display = 'none';
    document.getElementById('chartsWrapper').style.display = 'flex';

    // 1. 計算統計數據
    const statObj = {};
    todayRecord.forEach(item => {
        let key = item.drink + (item.temp !== '-' ? ` (${item.temp})` : '');
        statObj[key] = (statObj[key] || 0) + 1;
    });

    const labels = Object.keys(statObj);
    const dataValues = Object.values(statObj);

    // 2. 自動配適顏色陣列 (讓凍飲偏藍、熱飲/唔凍偏橘綠、無食偏灰)
    const backgroundColors = labels.map(label => {
        if (label.includes('(凍)')) return 'rgba(54, 162, 235, 0.7)';   // 藍色
        if (label.includes('(唔凍)')) return 'rgba(75, 192, 192, 0.7)'; // 綠色
        if (label.includes('唔食')) return 'rgba(201, 203, 207, 0.7)';  // 灰色
        if (label.includes('淨食')) return 'rgba(255, 205, 86, 0.7)';   // 黃色
        return 'rgba(255, 99, 132, 0.7)';                             // 其他預設粉紅
    });
    const borderColors = backgroundColors.map(color => color.replace('0.7', '1'));

    // 3. 渲染或更新圓餅圖 (Pie Chart)
    const ctxPie = document.getElementById('pieChart').getContext('2-digit' ? '2d' : '2d');
    if (myPieChart) {
        myPieChart.data.labels = labels;
        myPieChart.data.datasets[0].data = dataValues;
        myPieChart.data.datasets[0].backgroundColor = backgroundColors;
        myPieChart.data.datasets[0].borderColor = borderColors;
        myPieChart.update();
    } else {
        myPieChart = new Chart(ctxPie, {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: dataValues,
                    backgroundColor: backgroundColors,
                    borderColor: borderColors,
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 12 } } }
                }
            }
        });
    }

    // 4. 渲染或更新橫向條形圖 (Horizontal Bar Chart)
    const ctxBar = document.getElementById('barChart').getContext('2d');
    if (myBarChart) {
        myBarChart.data.labels = labels;
        myBarChart.data.datasets[0].data = dataValues;
        myBarChart.data.datasets[0].backgroundColor = backgroundColors;
        myBarChart.data.datasets[0].borderColor = borderColors;
        myBarChart.update();
    } else {
        myBarChart = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '點餐人次',
                    data: dataValues,
                    backgroundColor: backgroundColors,
                    borderColor: borderColors,
                    borderWidth: 1
                }]
            },
            options: {
                indexAxis: 'y', // 設為橫向條形圖，方便手機閱讀品名
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        beginAtZero: true,
                        ticks: { stepSize: 1, font: { weight: 'bold' } } // 強制只顯示整數
                    },
                    y: { ticks: { font: { size: 13, weight: 'bold' } } }
                }
            }
        });
    }
}

// 點餐功能 (帶庫存扣減)
function processSelectDrink(index, tempType) {
    const userName = document.getElementById('userSelect').value;
    if (!userName) { alert('請先在下拉選單選擇你的姓名！'); return; }

    const targetDrink = drinkList[index];
    if (targetDrink.stock <= 0) { alert(`抱歉！${targetDrink.name} 已經沒有庫存了！`); return; }

    const existingRecord = todayRecord.find(r => r.name === userName);
    if (existingRecord) {
        const oldDrink = drinkList.find(d => d.name === existingRecord.drink);
        if (oldDrink) oldDrink.stock += 1;
    }

    targetDrink.stock -= 1;
    todayRecord = todayRecord.filter(r => r.name !== userName);
    todayRecord.push({
        name: userName, drink: targetDrink.name, temp: tempType,
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    });

    saveToCloud();
    alert(`【${userName}】登記成功！已同步至雲端扣數。`);
}

function processPickSpecial(text) {
    const userName = document.getElementById('userSelect').value;
    if (!userName) { alert('請先在下拉選單選擇你的姓名！'); return; }

    const existingRecord = todayRecord.find(r => r.name === userName);
    if (existingRecord) {
        const oldDrink = drinkList.find(d => d.name === existingRecord.drink);
        if (oldDrink) oldDrink.stock += 1;
    }

    todayRecord = todayRecord.filter(r => r.name !== userName);
    todayRecord.push({
        name: userName, drink: text, temp: '-',
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    });

    saveToCloud();
    alert(`【${userName}】登記成功！`);
}

// === 代理事件監聽 ===
document.addEventListener('click', function(e) {
    if (e.target && e.target.classList.contains('btn-select')) {
        processSelectDrink(e.target.getAttribute('data-idx'), e.target.getAttribute('data-temp'));
    }
    if (e.target && e.target.id === 'btnSpecialNone') {
        processPickSpecial('唔食，真心唔食 🙏');
    }
    if (e.target && e.target.id === 'btnSpecialFoodOnly') {
        processPickSpecial('食，唔飲(淨食餐) 🙏');
    }
    if (e.target && e.target.id === 'btnCloudAddMember') {
        const newName = document.getElementById('newMemberName').value.trim();
        if (!newName) { alert('請輸入姓名！'); return; }
        if (userList.includes(newName)) { alert('名單中已存在此姓名！'); return; }
        userList.push(newName);
        saveToCloud();
        document.getElementById('newMemberName').value = '';
    }
    if (e.target && e.target.classList.contains('btn-delete-name')) {
        const idx = e.target.getAttribute('data-idx');
        const nameToRemove = userList[idx];
        if (confirm(`確定要把「${nameToRemove}」從人員名單中移除嗎？`)) {
            userList.splice(idx, 1);
            const hisRecord = todayRecord.find(r => r.name === nameToRemove);
            if (hisRecord) {
                const matchDrink = drinkList.find(d => d.name === hisRecord.drink);
                if (matchDrink) matchDrink.stock += 1;
                todayRecord = todayRecord.filter(r => r.name !== nameToRemove);
            }
            saveToCloud();
        }
    }
    if (e.target && e.target.id === 'btnCloudAddDrink') {
        const newName = document.getElementById('newDrinkName').value.trim();
        const newStock = parseInt(document.getElementById('newDrinkStock').value) || 0;
        if (!newName) { alert('請輸入飲品名稱！'); return; }
        if (drinkList.some(d => d.name === newName)) { alert('此飲品已存在！'); return; }

        drinkList.push({ name: newName, stock: newStock });
        saveToCloud();
        document.getElementById('newDrinkName').value = '';
        alert(`成功入庫：${newName}`);
    }
    if (e.target && e.target.classList.contains('btn-update-drink')) {
        const idx = e.target.getAttribute('data-idx');
        const oldName = drinkList[idx].name;
        const newName = document.getElementById(`editDrinkName${idx}`).value.trim();
        const newStock = parseInt(document.getElementById(`editDrinkStock${idx}`).value) || 0;
        
        if (!newName) { alert('品名不能為空'); return; }
        if (oldName !== newName) {
            todayRecord.forEach(item => { if (item.drink === oldName) item.drink = newName; });
        }
        drinkList[idx].name = newName;
        drinkList[idx].stock = newStock;
        saveToCloud();
        alert('雲端更新成功！');
    }
    if (e.target && e.target.classList.contains('btn-delete-drink')) {
        const idx = e.target.getAttribute('data-idx');
        const targetDrink = drinkList[idx].name;
        if (confirm(`確定從雲端倉庫移除「${targetDrink}」？`)) {
            todayRecord = todayRecord.filter(item => item.drink !== targetDrink);
            drinkList.splice(idx, 1);
            saveToCloud();
        }
    }
    if (e.target && e.target.id === 'btnClearAll') {
        if (confirm('確定要清空今日所有選擇記錄嗎？庫存將自動退回。')) {
            todayRecord.forEach(record => {
                const match = drinkList.find(d => d.name === record.drink);
                if (match) match.stock += 1;
            });
            todayRecord = [];
            saveToCloud();
            alert('紀錄已清空，庫存已回補！');
        }
    }
    if (e.target && e.target.id === 'btnToggleAdmin') {
        const panel = document.getElementById('adminPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }
});
</script>
</body>
</html>
