<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍹 倉庫每日飲品選擇 (雲端實時同步版)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
        }
        body {
            background: #f8f9fa;
            max-width: 900px;
            margin: 20px auto;
            padding: 15px;
        }
        .title {
            text-align: center;
            color: #d9534f;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h3 {
            color: #333;
            margin-bottom: 15px;
            border-left: 4px solid #5bc0de;
            padding-left: 10px;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 16px;
            background-color: #fff;
        }
        select:focus, input:focus {
            border-color: #5bc0de;
            outline: none;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-blue { background: #5bc0de; color: #fff; }
        .btn-red { background: #d9534f; color: #fff; }
        .btn-green { background: #5cb85c; color: #fff; }
        .btn-gray { background: #777; color: #fff; }

        .drink-item, .name-item {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
            gap: 10px;
        }
        .drink-item:last-child, .name-item:last-child { border-bottom: none; }

        .num-tag {
            font-size: 14px;
            padding: 3px 8px;
            border-radius: 8px;
            margin: 0 4px;
            display: inline-block;
            font-weight: bold;
        }
        .cold { background: #e1f5fe; color: #0288d1; }
        .warm { background: #e8f5e9; color: #388e3c; }
        .total { background: #fff3e0; color: #f57c00; }

        .record-item {
            padding: 8px;
            border-bottom: 1px solid #f1f1f1;
            font-size: 15px;
        }
        .admin { display: none; margin-top: 15px; }
        .total-user {
            text-align: center;
            font-size: 18px;
            color: #d9534f;
            font-weight: bold;
            margin: 10px 0;
        }
        .stat-item {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-num {
            color: #d9534f;
            font-weight: bold;
            background: #ffebee;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .loading-text {
            text-align: center;
            color: #999;
            padding: 10px;
        }
        .admin-sub-title {
            margin: 15px 0 10px 0;
            color: #666;
            border-left: 3px solid #777;
            padding-left: 8px;
        }
    </style>
</head>
<body>
    <h1 class="title">🍹 倉庫每日飲品選擇</h1>

    <div class="card">
        <h3>1. 選擇你的姓名</h3>
        <select id="userSelect">
            <option value="">-- 請選擇你的名字 --</option>
        </select>
    </div>

    <div class="card">
        <h3>2. 選擇飲品 凍 / 唔凍（實時數量）</h3>
        <div id="selectDrinkList" class="loading-text">連線雲端中，請稍候...</div>
    </div>

    <div class="card">
        <h3>3. 快捷選擇</h3>
        <div class="btn-group">
            <button class="btn-red" id="btnSpecialNone">🙏 唔食</button>
            <button class="btn-gray" id="btnSpecialFoodOnly">🙏 淨食餐</button>
        </div>
    </div>

    <div class="card">
        <h3>📊 今日整體統計</h3>
        <div id="totalStat"></div>
    </div>

    <div class="card">
        <h3>📋 今日選擇記錄</h3>
        <div class="total-user" id="userCount">今日總人數：0</div>
        <div id="recordList"></div>
    </div>

    <div class="card">
        <button class="btn-blue" id="btnToggleAdmin" style="width: 100%;">🔧 後台管理員面板 (名單/飲品修改)</button>
        <div class="admin" id="adminPanel">
            
            <h4 class="admin-sub-title">👥 人員名單管理</h4>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="newMemberName" placeholder="輸入新同事姓名" style="margin-bottom:0; flex: 3;">
                <button class="btn-green" id="btnCloudAddMember" style="white-space: nowrap; flex: 1;">➕ 新增姓名</button>
            </div>
            <div id="manageNameList" style="max-height: 180px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 20px;"></div>

            <h4 class="admin-sub-title">🥤 飲品品項管理</h4>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="newDrinkName" placeholder="輸入新飲品名稱" style="margin-bottom:0; flex: 3;">
                <button class="btn-green" id="btnCloudAddDrink" style="white-space: nowrap; flex: 1;">➕ 新增飲品</button>
            </div>
            <div id="manageDrinkList"></div>
        </div>
    </div>

    <div class="card" style="background: transparent; box-shadow: none; padding: 0;">
        <button class="btn-red" id="btnClearAll" style="width: 100%;">🗑️ 手動清空今日所有記錄</button>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// ⚠️【請將此處替換成你影片中的設定，確保金鑰正確】
const firebaseConfig = {
    apiKey: "AIzaSyCFbSd7K3NmoR_crJeyRHLkfiWrA4prHpE",
  authDomain: "warehouse-drinks.firebaseapp.com",
  databaseURL: "https://warehouse-drinks-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "warehouse-drinks",
  storageBucket: "warehouse-drinks.firebasestorage.app",
  messagingSenderId: "53252871821",
  appId: "1:53252871821:web:47d8aa223a7dba31f874c4"

};

// 初始化 Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 全域變數
let drinkList = [];
let todayRecord = [];
let userList = [];
let lastClearDate = "";
let lastUserListString = ""; 

// 獲取標準 YYYY-MM-DD 格式日期函數，徹底解決與舊版網頁打架產生的閃爍問題
function getTodayDateString() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

// 預設初始化數據
const defaultDrinks = ['可樂', '雪碧', '檸檬茶', '奶茶', '咖啡', '菊花茶'];
const defaultUsers = ['藍', 'Arthur', 'Andy', '筆筆', 'Mavis', 'Estella', 'Kevin', '文傑', 'Yan', 'Alice', 'Rain', 'Michelle'];

// 【監聽雲端資料庫實時更新】
onValue(ref(db, 'drinksData'), (snapshot) => {
    const data = snapshot.val();
    const nowDate = getTodayDateString(); 

    if (data) {
        drinkList = data.drinkList || defaultDrinks;
        todayRecord = data.todayRecord ? Object.values(data.todayRecord) : [];
        userList = data.userList || defaultUsers;
        lastClearDate = data.lastClearDate || "";

        // 判定跨日自動清空
        if (lastClearDate !== nowDate && lastClearDate.includes('-')) {
            todayRecord = [];
            lastClearDate = nowDate;
            saveToCloud();
            return;
        } else if (!lastClearDate.includes('-')) {
            // 如果雲端日期格式非 YYYY-MM-DD（如影片中的舊格式），強制校正格式但不清空數據，阻斷閃爍循環
            lastClearDate = nowDate;
            saveToCloud();
            return;
        }
    } else {
        drinkList = defaultDrinks;
        todayRecord = [];
        userList = defaultUsers;
        lastClearDate = nowDate;
        saveToCloud();
    }
    
    refreshUI();
});

function saveToCloud() {
    set(ref(db, 'drinksData'), {
        drinkList: drinkList,
        todayRecord: todayRecord,
        userList: userList,
        lastClearDate: lastClearDate
    });
}

function getDrinkStat(drinkName) {
    let coldNum = 0; let warmNum = 0;
    todayRecord.forEach(item => {
        if (item.drink === drinkName) {
            if (item.temp === '凍') coldNum++;
            if (item.temp === '唔凍') warmNum++;
        }
    });
    return { cold: coldNum, warm: warmNum, total: coldNum + warmNum };
}

// 實時網頁渲染
function refreshUI() {
    // 1. 智能渲染姓名選單（防止被其他人的點餐動作強制刷新而跳回預設）
    const currentUserListString = JSON.stringify(userList);
    if (lastUserListString !== currentUserListString) {
        const selectEl = document.getElementById('userSelect');
        const currentSelected = selectEl.value; 
        
        let selectHtml = '<option value="">-- 請選擇你的名字 --</option>';
        userList.forEach(user => {
            selectHtml += `<option value="${user}">${user}</option>`;
        });
        selectEl.innerHTML = selectHtml;
        
        if (userList.includes(currentSelected)) {
            selectEl.value = currentSelected;
        }
        lastUserListString = currentUserListString; 
    }

    // 2. 渲染飲品選擇區
    const selectWrap = document.getElementById('selectDrinkList');
    let drinkHtml = '';
    drinkList.forEach((drink, idx) => {
        const stat = getDrinkStat(drink);
        drinkHtml += `
            <div class="drink-item">
                <div>
                    <strong>${drink}</strong>
                    <span class="num-tag cold">凍：${stat.cold}人</span>
                    <span class="num-tag warm">唔凍：${stat.warm}人</span>
                    <span class="num-tag total">合計：${stat.total}人</span>
                </div>
                <div>
                    <button class="btn-blue btn-select" data-idx="${idx}" data-temp="凍">凍</button>
                    <button class="btn-green btn-select" data-idx="${idx}" data-temp="唔凍">唔凍</button>
                </div>
            </div>
        `;
    });
    selectWrap.innerHTML = drinkHtml || '<p style="text-align:center;color:#999;">暫無飲品</p>';

    // 3. 渲染後台名單管理
    const manageNameWrap = document.getElementById('manageNameList');
    let manageNameHtml = '';
    userList.forEach((user, idx) => {
        manageNameHtml += `
            <div class="name-item" style="padding: 6px 0;">
                <span>👤 ${user}</span>
                <button class="btn-red btn-delete-name" data-idx="${idx}" style="padding: 4px 10px; font-size:12px;">刪除</button>
            </div>
        `;
    });
    manageNameWrap.innerHTML = manageNameHtml || '<p style="color:#999; font-size:14px;">目前名單內無任何同事</p>';

    // 4. 渲染後台飲品管理
    const manageWrap = document.getElementById('manageDrinkList');
    let manageHtml = '';
    drinkList.forEach((drink, idx) => {
        const stat = getDrinkStat(drink);
        manageHtml += `
            <div class="drink-item">
                <div style="flex:1;">
                    <input value="${drink}" id="editDrink${idx}" style="width:100%; margin-bottom:0; padding:6px;">
                    <div style="margin-top:6px;">
                        <span class="num-tag cold">凍：${stat.cold}人</span>
                        <span class="num-tag warm">唔凍：${stat.warm}人</span>
                        <span class="num-tag total">合計：${stat.total}人</span>
                    </div>
                </div>
                <div style="margin-left:8px; display:flex; gap:5px;">
                    <button class="btn-green btn-update-drink" data-idx="${idx}">修改</button>
                    <button class="btn-red btn-delete-drink" data-idx="${idx}">刪除</button>
                </div>
            </div>
        `;
    });
    manageWrap.innerHTML = manageHtml;

    // 5. 渲染今日紀錄清單
    const recordWrap = document.getElementById('recordList');
    document.getElementById('userCount').innerText = `今日總人數：${todayRecord.length}`;
    if (todayRecord.length === 0) {
        recordWrap.innerHTML = '<p style="text-align:center;color:#999;padding: 10px 0;">暫無選擇記錄</p>';
    } else {
        let recHtml = '';
        todayRecord.forEach(item => {
            recHtml += `<div class="record-item">⏱️ ${item.time} ｜ 👤 <strong>${item.name}</strong> ｜ 🥤 ${item.drink} ｜ 🌡️ ${item.temp}</div>`;
        });
        recordWrap.innerHTML = recHtml;
    }

    // 6. 渲染整體統計
    const statWrap = document.getElementById('totalStat');
    const statObj = {};
    todayRecord.forEach(item => {
        let key = item.drink + (item.temp !== '-' ? ` (${item.temp})` : '');
        statObj[key] = (statObj[key] || 0) + 1;
    });
    let statHtml = '';
    for (let key in statObj) {
        statHtml += `<div class="stat-item"><span>${key}</span><span class="stat-num">${statObj[key]} 人次</span></div>`;
    }
    statWrap.innerHTML = statHtml || '<p style="text-align:center;color:#999;padding: 10px 0;">暫無統計數據</p>';
}

// 核心點餐邏輯
function processSelectDrink(index, tempType) {
    const userName = document.getElementById('userSelect').value;
    if (!userName) { alert('請先在下拉選單選擇你的姓名！'); return; }

    todayRecord = todayRecord.filter(r => r.name !== userName);
    todayRecord.push({
        name: userName, drink: drinkList[index], temp: tempType,
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    });

    saveToCloud();
    alert(`【${userName}】登記成功！已同步至雲端。`);
}

function processPickSpecial(text) {
    const userName = document.getElementById('userSelect').value;
    if (!userName) { alert('請先在下拉選單選擇你的姓名！'); return; }

    todayRecord = todayRecord.filter(r => r.name !== userName);
    todayRecord.push({
        name: userName, drink: text, temp: '-',
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    });

    saveToCloud();
    alert(`【${userName}】登記成功！`);
}

// === 事件監聽代理 ===
document.addEventListener('click', function(e) {
    // 點選飲料
    if (e.target && e.target.classList.contains('btn-select')) {
        processSelectDrink(e.target.getAttribute('data-idx'), e.target.getAttribute('data-temp'));
    }
    // 快捷鍵：唔食
    if (e.target && e.target.id === 'btnSpecialNone') {
        processPickSpecial('唔食，真心唔食 🙏');
    }
    // 快捷鍵：淨食餐
    if (e.target && e.target.id === 'btnSpecialFoodOnly') {
        processPickSpecial('食，唔飲(淨食餐) 🙏');
    }
    // 後台：新增同事姓名
    if (e.target && e.target.id === 'btnCloudAddMember') {
        const newName = document.getElementById('newMemberName').value.trim();
        if (!newName) { alert('請輸入姓名！'); return; }
        if (userList.includes(newName)) { alert('名單中已存在此姓名！'); return; }
        userList.push(newName);
        saveToCloud();
        document.getElementById('newMemberName').value = '';
    }
    // 後台：刪除同事姓名
    if (e.target && e.target.classList.contains('btn-delete-name')) {
        const idx = e.target.getAttribute('data-idx');
        if (confirm(`確定要把「${userList[idx]}」從人員名單中移除嗎？`)) {
            todayRecord = todayRecord.filter(r => r.name !== userList[idx]);
            userList.splice(idx, 1);
            saveToCloud();
        }
    }
    // 後台：新增飲品
    if (e.target && e.target.id === 'btnCloudAddDrink') {
        const newName = document.getElementById('newDrinkName').value.trim();
        if (!newName) { alert('請輸入飲品名稱！'); return; }
        if (drinkList.includes(newName)) { alert('此飲品已存在！'); return; }
        drinkList.push(newName);
        saveToCloud();
        document.getElementById('newDrinkName').value = '';
    }
    // 後台：修改飲品名稱
    if (e.target && e.target.classList.contains('btn-update-drink')) {
        const idx = e.target.getAttribute('data-idx');
        const oldName = drinkList[idx];
        const newName = document.getElementById(`editDrink${idx}`).value.trim();
        if (!newName) { alert('品名不能為空'); return; }
        if (oldName !== newName) {
            todayRecord.forEach(item => { if (item.drink === oldName) item.drink = newName; });
            drinkList[idx] = newName;
            saveToCloud();
            alert('雲端修改成功！');
        }
    }
    // 後台：刪除飲品
    if (e.target && e.target.classList.contains('btn-delete-drink')) {
        const idx = e.target.getAttribute('data-idx');
        if (confirm(`確定刪除「${drinkList[idx]}」？相關點餐紀錄將一併清除。`)) {
            todayRecord = todayRecord.filter(item => item.drink !== drinkList[idx]);
            drinkList.splice(idx, 1);
            saveToCloud();
        }
    }
    // 手動清空所有記錄
    if (e.target && e.target.id === 'btnClearAll') {
        if (confirm('確定要清空今日所有選擇記錄嗎？')) {
            todayRecord = [];
            saveToCloud();
            alert('紀錄已清空！');
        }
    }
    // 切換顯示管理面板
    if (e.target && e.target.id === 'btnToggleAdmin') {
        const panel = document.getElementById('adminPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }
});
</script>
</body>
</html>
